# ── Production Configuration (Docker) ──
# 敏感配置通过环境变量注入，参见 docker-compose.yml

hashids:
  salt: ${HASHIDS_SALT:wms-hashid-salt-2026-change-in-production}
  min-length: ${HASHIDS_MIN_LENGTH:8}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ml_wms?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&tinyInt1isBit=false}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: 0
      redisson:
        config: |
          singleServerConfig:
            address: "redis://${SPRING_DATA_REDIS_HOST:localhost}:${SPRING_DATA_REDIS_PORT:6379}"
            connectionMinimumIdleSize: 4
            connectionPoolSize: 16

logging:
  level:
    com.wms: INFO
    com.zaxxer.hikari: DEBUG
    org.springframework.web: WARN
    org.springframework.security: WARN
