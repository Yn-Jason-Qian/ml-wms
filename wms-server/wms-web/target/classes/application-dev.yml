spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ml_wms?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_general_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_general_ci
      data-source-properties:
        characterEncoding: UTF-8
        useUnicode: true

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      redisson:
        config: |
          singleServerConfig:
            address: "redis://localhost:6379"
            connectionMinimumIdleSize: 4
            connectionPoolSize: 16

logging:
  level:
    com.wms: DEBUG
    org.springframework.security: DEBUG
